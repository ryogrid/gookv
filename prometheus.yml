global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gookv-kvs'
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'host.docker.internal:20490'
          - 'host.docker.internal:20491'
          - 'host.docker.internal:20492'
        labels:
          cluster: 'txn-integrity-demo'

  - job_name: 'gookv-pd'
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'host.docker.internal:2382'
        labels:
          cluster: 'txn-integrity-demo'
